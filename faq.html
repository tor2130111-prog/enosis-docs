<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="icon.png">
<title>FAQ — Spotlight Enosis</title>
<style>
  :root{
    --bg:#0a0a14;
    --ink:#eef0f5;
    --muted:#8f8fa8;
    --accent:#6ea8ff;
    --accent-2:#b06bff;
    --accent-3:#7dffb8;
    --accent-glow:rgba(110,168,255,0.25);
    --line:#2c2a45;
    --surface:#12111f;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', ui-sans-serif, Roboto, Helvetica, Arial, sans-serif;
    --serif: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', serif;
    --mono: ui-monospace, 'Cascadia Mono', 'SF Mono', Consolas, monospace;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:
      radial-gradient(ellipse 640px 320px at 50% -60px, var(--accent-glow), transparent 70%),
      var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.6;
  }
  .page{ max-width:720px; margin:0 auto; padding:3.5rem 2rem 5rem; }
  .icon{
    display:block; width:72px; height:72px; margin:0 auto 1.1rem;
    filter: drop-shadow(0 0 18px var(--accent-glow));
    mix-blend-mode: screen;
  }
  .eyebrow{
    font-family:var(--mono); font-size:0.72rem; font-weight:700;
    letter-spacing:0.22em; text-transform:uppercase; color:var(--accent);
    text-align:center; margin-bottom:0.9rem;
  }
  h1{
    font-family:var(--serif); font-weight:400; text-align:center;
    font-size:clamp(1.9rem,5vw,2.5rem); margin:0 0 0.6rem;
    background: linear-gradient(90deg, var(--accent), var(--accent-2) 55%, var(--accent-3));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .sub{ text-align:center; color:var(--muted); margin:0 0 2.6rem; font-size:1rem; }

  .cat-label{
    font-family:var(--mono); font-size:0.68rem; font-weight:700; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--accent-3); margin:2.2rem 0 0.8rem;
  }
  .cat-label:first-of-type{ margin-top:0; }

  details{
    background:var(--surface); border:1px solid var(--line);
    margin-bottom:0.7rem; padding:0;
  }
  summary{
    padding:1rem 1.2rem; cursor:pointer; font-weight:600; font-size:0.98rem;
    list-style:none; position:relative; padding-right:2.4rem;
  }
  summary::-webkit-details-marker{ display:none; }
  summary::after{
    content:'+'; position:absolute; right:1.2rem; top:50%; transform:translateY(-50%);
    color:var(--accent); font-size:1.3rem; font-weight:400;
  }
  details[open] summary::after{ content:'–'; }
  details[open] summary{ border-bottom:1px solid var(--line); }
  .a{ padding:1rem 1.2rem 1.2rem; color:var(--muted); font-size:0.94rem; }
  .a strong{ color:var(--ink); }

  .ask{
    margin-top:3rem; padding-top:2.2rem; border-top:1px solid var(--line);
    text-align:center;
  }
  .ask p{ color:var(--muted); margin-bottom:0.8rem; }
  .ask a.btn{
    display:inline-block;
    background:var(--accent); color:#0a0a14; font-weight:700;
    padding:0.7rem 1.6rem; border-radius:6px; text-decoration:none; font-size:0.95rem;
  }
  .ask a.btn:hover{ background:var(--accent-3); }

  footer{ text-align:center; color:var(--muted); font-size:0.78rem; margin-top:3rem; font-family:var(--mono); }
  footer a{ color:var(--muted); }
</style>
</head>
<body>
  <div class="page">
    <img class="icon" src="icon.png" alt="Spotlight Enosis icon">
    <div class="eyebrow">Frequently Asked</div>
    <h1>Common Questions</h1>
    <p class="sub">We're still collecting the questions people actually ask us. Check back soon.</p>

    <div class="ask">
      <p>Have a question in the meantime?</p>
      <a class="btn" href="ask.html">Ask us directly</a>
    </div>

    <footer><a href="index.html">← Back to project docs</a> · <a href="about.html">About</a></footer>
  </div>
</body>
</html>
