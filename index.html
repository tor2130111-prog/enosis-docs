<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spotlight Enosis — Project Docs</title>
<style>
  :root{
    --bg:#0b0f07;
    --ink:#eef0e6;
    --muted:#8b9280;
    --accent:#caff3e;
    --line:#232a17;
    --surface:#12160c;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:
      radial-gradient(ellipse 640px 320px at 50% -60px, rgba(202,255,62,0.25), transparent 70%),
      var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',ui-sans-serif,Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2rem;
  }
  .wrap{ max-width:560px; width:100%; }
  .eyebrow{
    font-family:ui-monospace,'Cascadia Mono','SF Mono',Consolas,monospace;
    font-size:0.72rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase;
    color:var(--accent); margin-bottom:0.8rem; text-align:center;
  }
  h1{ text-align:center; font-size:clamp(1.8rem,5vw,2.4rem); margin:0 0 0.5rem; letter-spacing:-0.01em; }
  .sub{ text-align:center; color:var(--muted); margin:0 0 2.4rem; font-size:1rem; }
  .links{ display:flex; flex-direction:column; gap:1rem; }
  a.card{
    display:block;
    background:var(--surface);
    border:1px solid var(--line);
    border-left:3px solid var(--accent);
    padding:1.2rem 1.4rem;
    text-decoration:none;
    color:var(--ink);
  }
  a.card:hover{ border-left-color:#e8ff9c; }
  a.card .name{ font-weight:700; font-size:1.05rem; display:block; margin-bottom:0.3rem; }
  a.card .desc{ color:var(--muted); font-size:0.9rem; }
  footer{ text-align:center; color:var(--muted); font-size:0.8rem; margin-top:2.4rem; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Spotlight Enosis</div>
    <h1>Project Docs</h1>
    <p class="sub">Planning materials for the MVP build.</p>
    <div class="links">
      <a class="card" href="enosis-wireframes.html">
        <span class="name">MVP Wireframes →</span>
        <span class="desc">Low-fidelity screen-by-screen layout for the trimmed MVP: Network, Profile, Chat, Settings, Safety.</span>
      </a>
      <a class="card" href="enosis-roadmap.html">
        <span class="name">Production Status →</span>
        <span class="desc">Current build stage and what's coming next.</span>
      </a>
    </div>
    <footer>Updated 2 Jul 2026</footer>
  </div>
</body>
</html>
